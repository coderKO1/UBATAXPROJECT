version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: taxshield
      POSTGRES_PASSWORD: taxshield
      POSTGRES_DB: taxshield
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://taxshield:taxshield@postgres:5432/taxshield
      JWT_SECRET: super-secret-taxshield
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - '8000:8000'
    depends_on:
      - postgres

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  pgdata:
